<script type="module">

const results = document.getElementById('results');
const summary = document.getElementById('summary');
let passed = 0, failed = 0, total = 0;

function log(msg, cls = 'info') {
  results.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

async function test(name, fn) {
  total++;
  try {
    await fn();
    passed++;
    log(`  PASS  ${name}`, 'pass');
  } catch (e) {
    failed++;
    log(`  FAIL  ${name}: ${e.message}`, 'fail');
  }
}

function expect(condition, msg) {
  if (!condition) throw new Error(msg || 'assertion failed');
}

// Build a minimal valid SWG3 file
function buildSWG3(overrides = {}) {
  const n = overrides.n ?? 4;
  const k = overrides.k ?? 4;
  const channels = overrides.channels ?? 1;
  const layers = overrides.layers ?? 1;

  // Build payload for one channel
  const payloadParts = [];
  for (let ch = 0; ch < channels; ch++) {
    const actualLayers = 1;
    const nnz = 1;
    const indexMode = 1; // delta u8
    const indexData = new Uint8Array([0, 0, 0, 0]); // first index = 0
    const scale = 1.0;
    const deltaValues = new Int16Array([100]); // one coefficient
    const leftDiags = new Float32Array(actualLayers * n); // float16 = 2 bytes each
    const rightDiags = new Float32Array(actualLayers * k);
    for (let i = 0; i < leftDiags.length; i++) leftDiags[i] = 1.0;
    for (let i = 0; i < rightDiags.length; i++) rightDiags[i] = 1.0;

    // Convert diags to float16 bytes
    const lDiagBytes = new Uint8Array(actualLayers * n * 2);
    const rDiagBytes = new Uint8Array(actualLayers * k * 2);
    // Simple: just write 0x3C00 (float16 for 1.0) for each
    for (let i = 0; i < actualLayers * n; i++) { lDiagBytes[i*2] = 0x00; lDiagBytes[i*2+1] = 0x3C; }
    for (let i = 0; i < actualLayers * k; i++) { rDiagBytes[i*2] = 0x00; rDiagBytes[i*2+1] = 0x3C; }

    const chBuf = new ArrayBuffer(1 + 4 + 4 + 1 + 4 + indexData.length + 4 + nnz*2 + lDiagBytes.length + rDiagBytes.length);
    const chDV = new DataView(chBuf);
    let off = 0;
    chDV.setUint8(off, actualLayers); off += 1;
    chDV.setFloat32(off, 0.3, true); off += 4;
    chDV.setUint32(off, nnz, true); off += 4;
    chDV.setUint8(off, indexMode); off += 1;
    chDV.setUint32(off, indexData.length, true); off += 4;
    new Uint8Array(chBuf, off, indexData.length).set(indexData); off += indexData.length;
    chDV.setFloat32(off, scale, true); off += 4;
    new Uint8Array(chBuf, off, nnz*2).set(new Uint8Array(new Int16Array([100]).buffer)); off += nnz*2;
    new Uint8Array(chBuf, off, lDiagBytes.length).set(lDiagBytes); off += lDiagBytes.length;
    new Uint8Array(chBuf, off, rDiagBytes.length).set(rDiagBytes); off += rDiagBytes.length;
    payloadParts.push(new Uint8Array(chBuf));
  }

  // Concatenate payload
  const payloadLen = payloadParts.reduce((s, p) => s + p.length, 0);
  const payload = new Uint8Array(payloadLen);
  let pOff = 0;
  for (const p of payloadParts) { payload.set(p, pOff); pOff += p.length; }

  // Compress with CompressionStream
  return compressPayload(payload).then(compressed => {
    const headerSize = 24;
    const file = new ArrayBuffer(headerSize + compressed.length);
    const dv = new DataView(file);
    // Magic
    dv.setUint8(0, 0x53); dv.setUint8(1, 0x57); dv.setUint8(2, 0x47); dv.setUint8(3, 0x33);
    dv.setUint32(4, overrides.n ?? n, true);
    dv.setUint32(8, overrides.k ?? k, true);
    dv.setUint8(12, overrides.channels ?? channels);
    dv.setUint16(13, overrides.layers ?? layers, true);
    dv.setFloat32(15, 35.0, true);
    dv.setUint8(19, 7);
    dv.setUint32(20, overrides.compressedSize ?? compressed.length, true);
    new Uint8Array(file, headerSize).set(compressed);
    return file;
  });
}

async function compressPayload(data) {
  const cs = new CompressionStream('deflate');
  const writer = cs.writable.getWriter();
  writer.write(data);
  writer.close();
  const reader = cs.readable.getReader();
  const chunks = [];
  let len = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    len += value.byteLength;
  }
  const result = new Uint8Array(len);
  let off = 0;
  for (const c of chunks) { result.set(c, off); off += c.byteLength; }
  return result;
}

// Test by creating blob files and loading them through the app's file handler
// Since we can't import parseSWG3 directly, let's test the parser logic directly here:

async function parseSWG3_test(arrayBuffer) {
  const MAX_DECOMPRESSED_SIZE = 256 * 1024 * 1024;

  if (arrayBuffer.byteLength < 24) throw new Error('File too small for SWG3 header');

  const headerDV = new DataView(arrayBuffer, 0, 24);
  const magic = String.fromCharCode(headerDV.getUint8(0), headerDV.getUint8(1), headerDV.getUint8(2), headerDV.getUint8(3));
  if (magic !== 'SWG3') throw new Error(`Invalid magic: ${magic}`);

  const n = headerDV.getUint32(4, true);
  const k = headerDV.getUint32(8, true);
  if (n === 0 || k === 0 || n > 32768 || k > 32768) throw new Error(`Invalid dimensions: ${n}x${k}`);
  const totalPixels = n * k;
  if (totalPixels > 256 * 1024 * 1024) throw new Error(`Too many pixels: ${totalPixels}`);

  const channels = headerDV.getUint8(12);
  if (channels === 0 || channels > 4) throw new Error(`Invalid channels: ${channels}`);

  const layers = headerDV.getUint16(13, true);
  if (layers > 64) throw new Error(`Invalid layers: ${layers}`);

  const compressedSize = headerDV.getUint32(20, true);
  if (24 + compressedSize > arrayBuffer.byteLength) throw new Error(`compressedSize exceeds file`);

  const compressedData = new Uint8Array(arrayBuffer, 24, compressedSize);

  // Decompress
  const ds = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  writer.write(compressedData);
  writer.close();
  const reader = ds.readable.getReader();
  const chunks = [];
  let totalLen = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    totalLen += value.byteLength;
    if (totalLen > MAX_DECOMPRESSED_SIZE) { await reader.cancel(); throw new Error('Decompression bomb'); }
    chunks.push(value);
  }
  const raw = new Uint8Array(totalLen);
  let rOff = 0;
  for (const c of chunks) { raw.set(c, rOff); rOff += c.byteLength; }

  // Parse channels
  let offset = 0;
  const rawLen = raw.byteLength;
  const dv = new DataView(raw.buffer, raw.byteOffset, rawLen);

  for (let ch = 0; ch < channels; ch++) {
    if (offset + 14 > rawLen) throw new Error(`Truncated at channel ${ch} header`);
    const actualLayers = dv.getUint8(offset); offset += 1;
    if (actualLayers > 64) throw new Error(`Channel ${ch}: layers ${actualLayers}`);
    offset += 4; // ratio
    const nnz = dv.getUint32(offset, true); offset += 4;
    if (nnz > totalPixels) throw new Error(`Channel ${ch}: nnz > totalPixels`);
    const indexMode = dv.getUint8(offset); offset += 1;
    if (indexMode > 3) throw new Error(`Channel ${ch}: bad indexMode ${indexMode}`);
    const indexDataLen = dv.getUint32(offset, true); offset += 4;
    if (offset + indexDataLen > rawLen) throw new Error(`Channel ${ch}: indexData overflow`);
    offset += indexDataLen;

    if (offset + 4 + nnz*2 > rawLen) throw new Error(`Channel ${ch}: values overflow`);
    const scale = dv.getFloat32(offset, true); offset += 4;
    if (!isFinite(scale)) throw new Error(`Channel ${ch}: bad scale`);
    offset += nnz * 2;

    const diagBytes = actualLayers * (n + k) * 2;
    if (offset + diagBytes > rawLen) throw new Error(`Channel ${ch}: diags overflow`);
    offset += diagBytes;
  }

  return { n, k, channels, layers };
}

// ── Test Suite ──

log('=== SWG3 Parser Fuzz Tests ===\n');

log('── Valid Files ──');
await test('valid 4x4 1ch file parses', async () => {
  const buf = await buildSWG3({ n: 4, k: 4, channels: 1 });
  const r = await parseSWG3_test(buf);
  expect(r.n === 4 && r.k === 4);
});

await test('valid 8x8 3ch file parses', async () => {
  const buf = await buildSWG3({ n: 8, k: 8, channels: 3 });
  const r = await parseSWG3_test(buf);
  expect(r.channels === 3);
});

log('\n── Invalid Magic ──');
await test('wrong magic rejected', async () => {
  const buf = await buildSWG3();
  new Uint8Array(buf)[0] = 0x00;
  try { await parseSWG3_test(buf); expect(false, 'should throw'); } catch (e) { expect(e.message.includes('magic')); }
});

await test('empty file rejected', async () => {
  try { await parseSWG3_test(new ArrayBuffer(0)); expect(false); } catch (e) { expect(e.message.includes('too small')); }
});

await test('4 byte file rejected', async () => {
  try { await parseSWG3_test(new ArrayBuffer(4)); expect(false); } catch (e) { expect(true); }
});

log('\n── Invalid Dimensions ──');
await test('n=0 rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(4, 0, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('dimensions')); }
});

await test('k=0 rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(8, 0, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('dimensions')); }
});

await test('n=40000 rejected (>32768)', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(4, 40000, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('dimensions') || e.message.includes('pixels')); }
});

await test('n=32768 k=32768 rejected (>256M pixels)', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(4, 32768, true);
  new DataView(buf).setUint32(8, 32768, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('pixels') || e.message.includes('dimensions')); }
});

log('\n── Invalid Channels ──');
await test('channels=0 rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint8(12, 0);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('channels')); }
});

await test('channels=5 rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint8(12, 5);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('channels')); }
});

log('\n── Invalid Layers ──');
await test('layers=65 rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint16(13, 65, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('layers')); }
});

log('\n── Compressed Size Attacks ──');
await test('compressedSize > file size rejected', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(20, 999999, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(e.message.includes('exceeds')); }
});

await test('compressedSize=0 produces error', async () => {
  const buf = await buildSWG3();
  new DataView(buf).setUint32(20, 0, true);
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(true); }
});

log('\n── Truncated Payload ──');
await test('truncated zlib data errors gracefully', async () => {
  const buf = await buildSWG3();
  const truncated = buf.slice(0, 30); // only 6 bytes of compressed data
  new DataView(truncated).setUint32(20, 6, true);
  try { await parseSWG3_test(truncated); expect(false); } catch (e) { expect(true); }
});

log('\n── Corrupt Zlib ──');
await test('corrupt zlib data errors gracefully', async () => {
  const buf = await buildSWG3();
  const arr = new Uint8Array(buf);
  // Flip bits in compressed data
  for (let i = 24; i < Math.min(arr.length, 40); i++) arr[i] ^= 0xFF;
  try { await parseSWG3_test(buf); expect(false); } catch (e) { expect(true); }
});

log('\n── Payload Field Attacks ──');
await test('nnz > totalPixels rejected', async () => {
  // Build valid file, then decompress, corrupt nnz, recompress
  // Simpler: test the parser logic directly
  const payload = new Uint8Array(100);
  const pdv = new DataView(payload.buffer);
  pdv.setUint8(0, 1); // layers
  pdv.setFloat32(1, 0.3, true); // ratio
  pdv.setUint32(5, 9999, true); // nnz = 9999 > 4*4=16
  // The rest doesn't matter — should fail at nnz check

  const compressed = await compressPayload(payload);
  const file = new ArrayBuffer(24 + compressed.length);
  const dv = new DataView(file);
  dv.setUint8(0, 0x53); dv.setUint8(1, 0x57); dv.setUint8(2, 0x47); dv.setUint8(3, 0x33);
  dv.setUint32(4, 4, true); dv.setUint32(8, 4, true);
  dv.setUint8(12, 1); dv.setUint16(13, 1, true);
  dv.setFloat32(15, 35, true); dv.setUint8(19, 7);
  dv.setUint32(20, compressed.length, true);
  new Uint8Array(file, 24).set(compressed);

  try { await parseSWG3_test(file); expect(false); } catch (e) { expect(e.message.includes('nnz')); }
});

await test('indexMode=4 rejected', async () => {
  const payload = new Uint8Array(100);
  const pdv = new DataView(payload.buffer);
  pdv.setUint8(0, 1); pdv.setFloat32(1, 0.3, true); pdv.setUint32(5, 1, true);
  pdv.setUint8(9, 4); // indexMode = 4 (invalid)

  const compressed = await compressPayload(payload);
  const file = new ArrayBuffer(24 + compressed.length);
  const dv = new DataView(file);
  dv.setUint8(0, 0x53); dv.setUint8(1, 0x57); dv.setUint8(2, 0x47); dv.setUint8(3, 0x33);
  dv.setUint32(4, 4, true); dv.setUint32(8, 4, true);
  dv.setUint8(12, 1); dv.setUint16(13, 1, true);
  dv.setFloat32(15, 35, true); dv.setUint8(19, 7);
  dv.setUint32(20, compressed.length, true);
  new Uint8Array(file, 24).set(compressed);

  try { await parseSWG3_test(file); expect(false); } catch (e) { expect(e.message.includes('indexMode')); }
});

await test('NaN scale rejected', async () => {
  const payload = new Uint8Array(100);
  const pdv = new DataView(payload.buffer);
  pdv.setUint8(0, 1); pdv.setFloat32(1, 0.3, true); pdv.setUint32(5, 0, true); // nnz=0
  pdv.setUint8(9, 1); pdv.setUint32(10, 0, true); // indexMode=1, indexDataLen=0
  pdv.setFloat32(14, NaN, true); // scale = NaN

  const compressed = await compressPayload(payload);
  const file = new ArrayBuffer(24 + compressed.length);
  const dv = new DataView(file);
  dv.setUint8(0, 0x53); dv.setUint8(1, 0x57); dv.setUint8(2, 0x47); dv.setUint8(3, 0x33);
  dv.setUint32(4, 4, true); dv.setUint32(8, 4, true);
  dv.setUint8(12, 1); dv.setUint16(13, 1, true);
  dv.setFloat32(15, 35, true); dv.setUint8(19, 7);
  dv.setUint32(20, compressed.length, true);
  new Uint8Array(file, 24).set(compressed);

  try { await parseSWG3_test(file); expect(false); } catch (e) { expect(e.message.includes('scale')); }
});

log('\n── Random Fuzzing (50 iterations) ──');
let fuzzPassed = 0;
for (let i = 0; i < 50; i++) {
  const size = Math.floor(Math.random() * 200) + 24;
  const buf = new ArrayBuffer(size);
  const arr = new Uint8Array(buf);
  crypto.getRandomValues(arr);
  // Keep SWG3 magic sometimes to test deeper parsing
  if (i % 3 === 0) { arr[0]=0x53; arr[1]=0x57; arr[2]=0x47; arr[3]=0x33; }
  try {
    await parseSWG3_test(buf);
    // If it somehow parsed, that's suspicious but not necessarily wrong
    fuzzPassed++;
  } catch (e) {
    fuzzPassed++; // Expected to fail gracefully
  }
}
total++;
if (fuzzPassed === 50) {
  passed++;
  log(`  PASS  50/50 random inputs handled gracefully`, 'pass');
} else {
  failed++;
  log(`  FAIL  ${fuzzPassed}/50 random inputs handled (${50-fuzzPassed} crashed)`, 'fail');
}

// ── Summary ──
log(`\n${'='.repeat(40)}`);
const allPassed = failed === 0;
summary.textContent = allPassed ? `ALL ${passed}/${total} TESTS PASSED` : `${failed}/${total} TESTS FAILED`;
summary.className = allPassed ? 'summary-pass' : 'summary-fail';
log(summary.textContent, allPassed ? 'pass' : 'fail');
</script>
