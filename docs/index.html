<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWG3 Image Viewer & Compressor</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #2a5a9a;
    --success: #4caf50;
    --warn: #ff9800;
    --error: #f44336;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-gpu { background: #1b5e20; color: #a5d6a7; }
  .badge-cpu { background: #e65100; color: #ffcc80; }
  .badge-none { background: #b71c1c; color: #ef9a9a; }

  #warning-banner {
    display: none;
    width: 100%;
    padding: 10px 24px;
    background: #3e2723;
    border-bottom: 1px solid #5d4037;
    color: #ffcc80;
    font-size: 13px;
  }

  /* ─── Tab bar ──────────────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 800px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    border-right: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    background: var(--accent-dim);
    color: #fff;
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 1400px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #progress-area {
    width: 100%;
    max-width: 800px;
    margin-bottom: 12px;
    display: none;
  }
  #progress-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }

  #info-panel {
    width: 100%;
    max-width: 800px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  #info-panel span { white-space: nowrap; }

  #canvas-container {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
  }
  canvas {
    max-width: 100%;
    height: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  #drop-zone, .drop-zone {
    width: 100%;
    max-width: 800px;
    height: 200px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 16px;
  }
  #drop-zone.drag-over, .drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--text);
  }
  #drop-zone.hidden, .drop-zone.hidden { display: none; }

  #error-box {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 12px 16px;
    background: #3e1010;
    border: 1px solid var(--error);
    border-radius: 4px;
    color: #ef9a9a;
    font-size: 13px;
    margin-bottom: 12px;
  }

  /* ─── Comparison UI ─────────────────────────────────────────────── */
  #compare-bar {
    display: none;
    width: 100%;
    max-width: 800px;
    margin-bottom: 12px;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #compare-bar.active { display: flex; }
  .mode-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-tab {
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    border-right: 1px solid var(--border);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
  }
  .mode-tab:last-child { border-right: none; }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    background: var(--accent-dim);
    color: #fff;
  }
  #opacity-control {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  #opacity-control.visible { display: flex; }
  #opacity-slider {
    width: 100px;
    accent-color: var(--accent);
  }
  #compare-hint {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Comparison containers */
  #compare-container {
    display: none;
    width: 100%;
    justify-content: center;
  }
  #compare-container.active { display: flex; }

  /* 2-up mode */
  .two-up {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 100%;
  }
  .two-up .panel {
    flex: 1;
    min-width: 0;
    text-align: center;
  }
  .two-up .panel canvas {
    max-width: 100%;
    height: auto;
  }
  .two-up .label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* Swipe mode */
  .swipe-wrap {
    position: relative;
    overflow: hidden;
    cursor: ew-resize;
    line-height: 0;
  }
  .swipe-wrap canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .swipe-overlay {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }
  .swipe-overlay canvas {
    display: block;
    height: 100%;
    width: auto;
    max-width: none;
  }
  .swipe-line {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--accent);
    pointer-events: none;
    z-index: 2;
  }
  .swipe-label {
    position: absolute;
    top: 6px;
    font-size: 11px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 3;
  }
  .swipe-label-left { left: 6px; }
  .swipe-label-right { right: 6px; }

  /* Onion skin mode */
  .onion-wrap {
    position: relative;
    line-height: 0;
  }
  .onion-wrap canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .onion-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .onion-top canvas {
    width: 100%;
    height: 100%;
  }

  /* ─── Compress Panel ────────────────────────────────────────────── */
  #compress-panel {
    display: none;
    width: 100%;
    max-width: 800px;
  }
  .compress-section {
    margin-bottom: 16px;
  }
  .compress-section h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }
  .param-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .param-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .param-group label {
    font-size: 12px;
    color: var(--text-dim);
  }
  .param-group input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  .param-group input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    width: 80px;
  }
  .param-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .param-row input[type="checkbox"] {
    accent-color: var(--accent);
  }
  #compress-results {
    display: none;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  #source-preview {
    max-width: 100%;
    height: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-top: 8px;
  }
  #source-info {
    font-size: 13px;
    color: var(--text);
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    line-height: 1.5;
  }
  #source-info:empty {
    display: none;
  }
  #download-swg {
    display: none;
    margin-top: 8px;
    text-decoration: none;
  }

  /* ─── Mobile responsive ──────────────────────────────────────── */
  @media (max-width: 600px) {
    body {
      overflow-x: hidden;
    }
    header {
      flex-wrap: wrap;
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 16px;
      gap: 10px;
    }
    .controls {
      flex-wrap: wrap;
      width: 100%;
    }
    button {
      min-height: 44px;
    }
    .tab-bar {
      max-width: 100%;
    }
    .tab-btn {
      flex: 1;
      min-height: 44px;
    }
    #canvas-container {
      overflow-x: auto;
      max-width: 100vw;
    }
    .compress-section .controls {
      width: 100%;
    }
    .compress-section input[type="range"],
    .compress-section input[type="number"],
    .compress-section select {
      width: 100%;
    }
    .param-grid {
      grid-template-columns: 1fr;
    }
    .param-row {
      flex-wrap: wrap;
    }
    .param-group input[type="number"] {
      width: 100%;
    }
    #camera-area video,
    #camera-preview {
      max-width: 100%;
    }
    #opacity-slider {
      width: 80px;
    }
    .two-up {
      flex-direction: column;
    }
    #compare-bar {
      gap: 8px;
    }
    .mode-tabs {
      width: 100%;
    }
    .mode-tab {
      flex: 1;
      min-height: 44px;
    }
    main {
      padding: 12px 8px;
    }
  }
</style>
</head>
<body>

<header>
  <h1><span>SWG3</span> Image Viewer</h1>
  <div class="controls">
    <button id="btn-demo">Load Demo</button>
    <button id="btn-original">Load Original</button>
    <button id="btn-file">Open File...</button>
    <input type="file" id="file-input" accept=".swg" hidden>
  </div>
  <span id="gpu-badge" class="badge"></span>
  <a href="blog.html" style="color:var(--accent); font-size:13px; text-decoration:none; margin-left:auto;">Blog: When AI Writes Code You Can't Review</a>
</header>

<div id="warning-banner"></div>

<main>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-viewer">Viewer</button>
    <button class="tab-btn" id="tab-compress">Compress</button>
  </div>

  <div id="error-box"></div>
  <div id="progress-area">
    <div id="progress-text">Initializing...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="info-panel"></div>

  <!-- ─── Viewer Panel ─────────────────────────────────────────────── -->
  <div id="viewer-panel" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div id="compare-bar">
      <button id="btn-original">Load Original...</button>
      <input type="file" id="original-input" accept="image/*" hidden>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="2up">2-up</button>
        <button class="mode-tab" data-mode="swipe">Swipe</button>
        <button class="mode-tab" data-mode="onion">Onion Skin</button>
      </div>
      <div id="opacity-control">
        <span>Opacity:</span>
        <input type="range" id="opacity-slider" min="0" max="100" value="50">
        <span id="opacity-value">50%</span>
      </div>
      <span id="compare-hint">Drop or select original image to compare</span>
    </div>
    <div id="canvas-container">
      <canvas id="canvas" width="1" height="1"></canvas>
    </div>
    <div id="compare-container"></div>
    <div id="drop-zone">Drop .swg file here or use buttons above</div>
  </div>

  <!-- ─── Compress Panel ───────────────────────────────────────────── -->
  <div id="compress-panel">
    <div class="compress-section">
      <h3>Source Image</h3>
      <div class="controls">
        <button id="btn-source">Select Image...</button>
        <button id="btn-camera">Take Photo</button>
      </div>
      <input type="file" id="source-input" accept="image/*" hidden>
      <div id="camera-area" style="display:none; margin-top:8px; width:100%; max-width:800px;">
        <video id="camera-preview" autoplay playsinline style="width:100%; border-radius:4px; border:1px solid var(--border);"></video>
        <div class="controls" style="margin-top:8px;">
          <button id="btn-shutter">Capture</button>
          <button id="btn-camera-cancel">Cancel</button>
          <select id="camera-select" style="background:var(--surface); color:var(--text); border:1px solid var(--border); padding:4px 8px; border-radius:4px; font-size:12px;"></select>
        </div>
      </div>
      <div id="source-drop-zone" class="drop-zone" style="height:150px; margin-top:8px;">
        Drop PNG/JPEG image here
      </div>
      <canvas id="source-preview" style="display:none;"></canvas>
      <div id="source-info"></div>
      <div id="size-estimate" style="font-size:12px; color:var(--text-dim); margin-top:4px;"></div>
    </div>

    <div class="compress-section">
      <h3>Parameters</h3>
      <div class="param-grid">
        <div class="param-group">
          <label>Target PSNR: <span id="psnr-display">35</span> dB</label>
          <input type="range" id="psnr-slider" min="20" max="50" value="35" step="1">
        </div>
        <div class="param-group">
          <label>Layers</label>
          <input type="number" id="layers-input" min="1" max="12" value="6">
        </div>
        <div class="param-group">
          <label>Max Iterations</label>
          <input type="number" id="iter-input" min="1" max="15" value="7">
        </div>
        <div class="param-group">
          <div class="param-row">
            <input type="checkbox" id="autotune-check">
            <label for="autotune-check">Auto-tune DCT ratio</label>
          </div>
        </div>
      </div>
      <button id="btn-compress" disabled>Compress</button>
      <button id="btn-cancel-compress" style="display:none; background:#8b0000; border-color:#f44336;">Cancel</button>
    </div>

    <canvas id="compress-preview" style="display:none; max-width:100%; margin-top:12px; border:1px solid var(--border);"></canvas>
    <div id="compress-results"></div>
    <a id="download-swg" class="controls">
      <button>Download .swg</button>
    </a>
  </div>
</main>

<script type="module" src="app.js"></script>
<script>
  // PSNR slider display
  const psnrSlider = document.getElementById('psnr-slider');
  const psnrDisplay = document.getElementById('psnr-display');
  if (psnrSlider && psnrDisplay) {
    psnrSlider.addEventListener('input', () => {
      psnrDisplay.textContent = psnrSlider.value;
    });
  }
</script>
</body>
</html>
