<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWG3 Image Viewer</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #2a5a9a;
    --success: #4caf50;
    --warn: #ff9800;
    --error: #f44336;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-gpu { background: #1b5e20; color: #a5d6a7; }
  .badge-cpu { background: #e65100; color: #ffcc80; }
  .badge-none { background: #b71c1c; color: #ef9a9a; }

  #warning-banner {
    display: none;
    width: 100%;
    padding: 10px 24px;
    background: #3e2723;
    border-bottom: 1px solid #5d4037;
    color: #ffcc80;
    font-size: 13px;
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 1400px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #progress-area {
    width: 100%;
    max-width: 800px;
    margin-bottom: 12px;
    display: none;
  }
  #progress-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }

  #info-panel {
    width: 100%;
    max-width: 800px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  #info-panel span { white-space: nowrap; }

  #canvas-container {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
  }
  canvas {
    max-width: 100%;
    height: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  #drop-zone {
    width: 100%;
    max-width: 800px;
    height: 200px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 16px;
  }
  #drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--text);
  }
  #drop-zone.hidden { display: none; }

  #error-box {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 12px 16px;
    background: #3e1010;
    border: 1px solid var(--error);
    border-radius: 4px;
    color: #ef9a9a;
    font-size: 13px;
    margin-bottom: 12px;
  }

  /* ─── Comparison UI ─────────────────────────────────────────────── */
  #compare-bar {
    display: none;
    width: 100%;
    max-width: 800px;
    margin-bottom: 12px;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #compare-bar.active { display: flex; }
  .mode-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-tab {
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    border-right: 1px solid var(--border);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
  }
  .mode-tab:last-child { border-right: none; }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    background: var(--accent-dim);
    color: #fff;
  }
  #opacity-control {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  #opacity-control.visible { display: flex; }
  #opacity-slider {
    width: 100px;
    accent-color: var(--accent);
  }
  #compare-hint {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Comparison containers */
  #compare-container {
    display: none;
    width: 100%;
    justify-content: center;
  }
  #compare-container.active { display: flex; }

  /* 2-up mode */
  .two-up {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 100%;
  }
  .two-up .panel {
    flex: 1;
    min-width: 0;
    text-align: center;
  }
  .two-up .panel canvas {
    max-width: 100%;
    height: auto;
  }
  .two-up .label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* Swipe mode */
  .swipe-wrap {
    position: relative;
    overflow: hidden;
    cursor: ew-resize;
    line-height: 0;
  }
  .swipe-wrap canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .swipe-overlay {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }
  .swipe-overlay canvas {
    display: block;
    height: 100%;
    width: auto;
    max-width: none;
  }
  .swipe-line {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--accent);
    pointer-events: none;
    z-index: 2;
  }
  .swipe-label {
    position: absolute;
    top: 6px;
    font-size: 11px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 3;
  }
  .swipe-label-left { left: 6px; }
  .swipe-label-right { right: 6px; }

  /* Onion skin mode */
  .onion-wrap {
    position: relative;
    line-height: 0;
  }
  .onion-wrap canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .onion-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .onion-top canvas {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<header>
  <h1><span>SWG3</span> Image Viewer</h1>
  <div class="controls">
    <button id="btn-demo">Load Demo</button>
    <button id="btn-file">Open File...</button>
    <input type="file" id="file-input" accept=".swg" hidden>
  </div>
  <span id="gpu-badge" class="badge"></span>
</header>

<div id="warning-banner"></div>

<main>
  <div id="error-box"></div>
  <div id="progress-area">
    <div id="progress-text">Initializing...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="info-panel"></div>
  <div id="compare-bar">
    <button id="btn-original">Load Original...</button>
    <input type="file" id="original-input" accept="image/*" hidden>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="2up">2-up</button>
      <button class="mode-tab" data-mode="swipe">Swipe</button>
      <button class="mode-tab" data-mode="onion">Onion Skin</button>
    </div>
    <div id="opacity-control">
      <span>Opacity:</span>
      <input type="range" id="opacity-slider" min="0" max="100" value="50">
      <span id="opacity-value">50%</span>
    </div>
    <span id="compare-hint">Drop or select original image to compare</span>
  </div>
  <div id="canvas-container">
    <canvas id="canvas" width="1" height="1"></canvas>
  </div>
  <div id="compare-container"></div>
  <div id="drop-zone">Drop .swg file here or use buttons above</div>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
