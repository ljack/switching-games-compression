<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWG3 Image Viewer</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #2a5a9a;
    --success: #4caf50;
    --warn: #ff9800;
    --error: #f44336;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-gpu { background: #1b5e20; color: #a5d6a7; }
  .badge-cpu { background: #e65100; color: #ffcc80; }
  .badge-none { background: #b71c1c; color: #ef9a9a; }

  #warning-banner {
    display: none;
    width: 100%;
    padding: 10px 24px;
    background: #3e2723;
    border-bottom: 1px solid #5d4037;
    color: #ffcc80;
    font-size: 13px;
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 1400px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #progress-area {
    width: 100%;
    max-width: 800px;
    margin-bottom: 12px;
    display: none;
  }
  #progress-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }

  #info-panel {
    width: 100%;
    max-width: 800px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  #info-panel span { white-space: nowrap; }

  #canvas-container {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
  }
  canvas {
    max-width: 100%;
    height: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  #drop-zone {
    width: 100%;
    max-width: 800px;
    height: 200px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 16px;
  }
  #drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--text);
  }
  #drop-zone.hidden { display: none; }

  #error-box {
    display: none;
    width: 100%;
    max-width: 800px;
    padding: 12px 16px;
    background: #3e1010;
    border: 1px solid var(--error);
    border-radius: 4px;
    color: #ef9a9a;
    font-size: 13px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1><span>SWG3</span> Image Viewer</h1>
  <div class="controls">
    <button id="btn-demo">Load Demo</button>
    <button id="btn-file">Open File...</button>
    <input type="file" id="file-input" accept=".swg" hidden>
  </div>
  <span id="gpu-badge" class="badge"></span>
</header>

<div id="warning-banner"></div>

<main>
  <div id="error-box"></div>
  <div id="progress-area">
    <div id="progress-text">Initializing...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="info-panel"></div>
  <div id="canvas-container">
    <canvas id="canvas" width="1" height="1"></canvas>
  </div>
  <div id="drop-zone">Drop .swg file here or use buttons above</div>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
